services:
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=warn
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--api-urls", "localhost:9644"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  producer:
    build: ./producer
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      TOPIC: ${TOPIC:-reddit-comments}
      NUM_MESSAGES: ${NUM_MESSAGES:-200}
      NUM_PRODUCERS: ${NUM_PRODUCERS:-1}
      NUM_PARTITIONS: ${NUM_PARTITIONS:-1}
      FAKER_SEED: ${FAKER_SEED:-42}
      EXP_LABEL: ${EXP_LABEL:-smoke}
      PRODUCER_ID: "0"
    volumes:
      - ./logs:/logs
    depends_on:
      redpanda:
        condition: service_healthy
    restart: "no"

  # Used only in the 2-producer experiment (exp08). Activated via --profile two-producers.
  producer2:
    build: ./producer
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      TOPIC: ${TOPIC:-reddit-comments}
      NUM_MESSAGES: ${NUM_MESSAGES:-200}
      NUM_PRODUCERS: ${NUM_PRODUCERS:-1}
      NUM_PARTITIONS: ${NUM_PARTITIONS:-1}
      FAKER_SEED: ${FAKER_SEED:-42}
      EXP_LABEL: ${EXP_LABEL:-smoke}
      PRODUCER_ID: "1"
    volumes:
      - ./logs:/logs
    depends_on:
      redpanda:
        condition: service_healthy
    restart: "no"
    profiles: [two-producers]

  consumer:
    build: ./consumer
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      TOPIC: ${TOPIC:-reddit-comments}
      GROUP_ID: ${GROUP_ID:-reddit-consumers}
      NUM_PRODUCERS: ${NUM_PRODUCERS:-1}
      EXP_LABEL: ${EXP_LABEL:-smoke}
      CONSUMER_LOG_DIR: /logs
    volumes:
      - ./logs:/logs
    depends_on:
      redpanda:
        condition: service_healthy
    restart: "no"

  aggregator:
    build: ./aggregator
    environment:
      LOG_DIR: /logs
      REPORT_DIR: /reports
    volumes:
      - ./logs:/logs
      - ./reports:/reports
    profiles:
      - aggregate
    restart: "no"
